<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../style.css">

<body>

    <div id="timeline_wrap">

                <div class="nav_btn cont_choix_anne">

                    <p>région</p>
                    <label class="switch">
                        <input id="zone_timeline" type="checkbox" onclick="checkbox()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="nav_menu">
                <div class="nav_btn"><a href="map.html">map</a></div>
                <div class="nav_btn"><a href="timeline.html">timeline</a></div>
